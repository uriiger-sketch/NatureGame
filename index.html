<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BibitesSim">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#07070f">
  <title>BibitesSim</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bot: env(safe-area-inset-bottom, 0px);
      --safe-l:   env(safe-area-inset-left, 0px);
      --safe-r:   env(safe-area-inset-right, 0px);
      --header-h: 52px;
      --pop-h: 36px;
      --bg:     #07070f;
      --bg2:    #0b0b18;
      --border: #1e1e38;
      --accent: #4488ff;
      --text:   #dde0f0;
      --dim:    #667;
    }

    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: var(--bg);
      overflow: hidden;
      overscroll-behavior: none;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      min-height: -webkit-fill-available;
      padding-top: var(--safe-top);
      padding-left: var(--safe-l);
      padding-right: var(--safe-r);
      font-family: -apple-system, 'SF Pro Text', system-ui, sans-serif;
      color: var(--text);
    }

    /* ── Header ── */
    #header {
      flex: 0 0 var(--header-h);
      height: var(--header-h);
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 10px;
      background: rgba(7,7,15,0.97);
      border-bottom: 1px solid var(--border);
      z-index: 20;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    #tickDisplay {
      font-size: 12px;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      min-width: 68px;
    }

    #popDisplay {
      font-size: 11px;
      color: var(--dim);
      flex: 1;
    }

    .hbtn {
      background: #181830;
      border: 1px solid var(--border);
      color: #8899cc;
      font-size: 13px;
      font-family: inherit;
      padding: 0 10px;
      height: 34px;
      min-width: 38px;
      border-radius: 8px;
      cursor: pointer;
      touch-action: manipulation;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      flex-shrink: 0;
    }
    .hbtn:active { background: #222244; }

    /* ── Speed control ── */
    #speedCtrl {
      display: flex;
      align-items: center;
      gap: 5px;
      background: #0f0f22;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0 8px;
      height: 34px;
      flex-shrink: 0;
    }
    #speedCtrl span.icon { font-size: 12px; color: var(--dim); }
    #speedSlider {
      -webkit-appearance: none;
      appearance: none;
      width: 72px;
      height: 4px;
      background: #2a2a50;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    #speedSlider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }
    #speedLabel {
      font-size: 10px;
      color: var(--accent);
      min-width: 30px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    /* ── Main area ── */
    #main {
      flex: 1 1 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── World canvas wrapper ── */
    #worldWrap {
      flex: 0 0 auto;
      position: relative;
      background: #050509;
      overflow: hidden;
    }

    #worldCanvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: block;
      touch-action: none;
    }

    /* ── Sidebar ── */
    #sidebar {
      flex: 1 1 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    #popCanvas {
      flex: 0 0 var(--pop-h);
      display: block;
      width: 100%;
      background: #06060d;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      touch-action: none;
    }

    /* ── Top-3 brain panels (shown when no creature selected) ── */
    #brainsRow {
      flex: 1 1 0;
      min-height: 0;
      display: flex;
      gap: 3px;
      padding: 4px;
      overflow: hidden;
    }

    .brainWrap {
      flex: 1 1 0;
      min-width: 0;
      display: flex;
      flex-direction: column;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .brainLabel {
      flex: 0 0 auto;
      font-size: 10px;
      color: var(--dim);
      text-align: center;
      padding: 3px 4px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .brainCanvas {
      flex: 1 1 0;
      display: block;
      width: 100%;
      min-height: 0;
    }

    /* ── Selected-creature info (shown inside sidebar when creature selected) ── */
    #creatureInfo {
      flex: 1 1 0;
      min-height: 0;
      display: none;           /* toggled by JS */
      flex-direction: column;
      padding: 4px;
      gap: 4px;
    }
    #creatureInfo.open { display: flex; }

    #infoHeader {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 2px 2px 4px;
      border-bottom: 1px solid var(--border);
    }

    #panelTitle {
      flex: 1;
      font-size: 12px;
      color: #aabbee;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #closePanelBtn {
      background: #1a1a38;
      border: 1px solid var(--border);
      color: #667;
      font-size: 14px;
      width: 28px; height: 28px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
      flex-shrink: 0;
    }
    #closePanelBtn:active { background: #222244; }

    #brainDetail {
      flex: 1 1 0;
      display: block;
      width: 100%;
      min-height: 0;
      background: #08081a;
      border-radius: 8px;
    }

    #panelStats {
      flex: 0 0 auto;
      font-size: 10px;
      color: var(--dim);
      text-align: center;
      line-height: 1.55;
      font-variant-numeric: tabular-nums;
      padding-bottom: 2px;
    }

    /* ── Config / Settings panel (fixed overlay, only for settings) ── */
    #configPanel {
      position: fixed;
      inset: auto 0 0 0;
      max-height: 75%;
      background: #0d0d1f;
      border-top: 1.5px solid #2a2a58;
      border-radius: 16px 16px 0 0;
      display: flex;
      flex-direction: column;
      padding: 0 18px calc(16px + var(--safe-bot));
      transform: translateY(110%);
      transition: transform 0.3s cubic-bezier(0.32, 0, 0.67, 0);
      will-change: transform;
      z-index: 400;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-y;
    }
    #configPanel.open {
      transform: translateY(0);
      transition-timing-function: cubic-bezier(0.33, 1, 0.68, 1);
    }

    #configHandle {
      flex: 0 0 auto;
      width: 40px; height: 4px;
      background: #2a2a48;
      border-radius: 2px;
      margin: 10px auto 14px;
    }

    .cfg-section {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--dim);
      margin: 12px 0 6px;
    }

    .cfg-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 0;
      border-bottom: 1px solid #141428;
    }

    .cfg-label {
      flex: 0 0 110px;
      font-size: 13px;
      color: #aabbee;
    }

    .cfg-row input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 4px;
      background: #2a2a50;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    .cfg-row input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      box-shadow: 0 0 6px rgba(68,136,255,0.5);
    }

    .cfg-val {
      flex: 0 0 34px;
      font-size: 12px;
      color: var(--accent);
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .cfg-actions {
      display: flex;
      gap: 8px;
      margin-top: 18px;
      padding-bottom: 4px;
    }

    .cfg-actions .hbtn {
      flex: 1;
      height: 44px;
      font-size: 14px;
    }

    /* ── Landscape layout ── */
    @media (orientation: landscape) {
      #main { flex-direction: row; }
      #worldWrap { flex: 0 0 55%; }
      #sidebar { flex: 1 1 0; }
    }

    /* ── Hint overlay ── */
    #hint {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.55);
      color: #8899bb;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 20px;
      pointer-events: none;
      opacity: 1;
      transition: opacity 1s;
      white-space: nowrap;
    }
    #hint.hidden { opacity: 0; }
  </style>
</head>
<body>

<header id="header">
  <span id="tickDisplay">Tick 0</span>
  <span id="popDisplay">H:30 · C:6</span>
  <button class="hbtn" id="pauseBtn">⏸</button>
  <div id="speedCtrl">
    <span class="icon">⏩</span>
    <input type="range" id="speedSlider" min="0" max="10" value="5" step="1">
    <span id="speedLabel">1/20</span>
  </div>
  <button class="hbtn" id="settingsBtn" title="Settings">⚙</button>
</header>

<div id="main">
  <div id="worldWrap">
    <canvas id="worldCanvas"></canvas>
    <div id="hint">Tap a creature to inspect it</div>
  </div>

  <div id="sidebar">
    <canvas id="popCanvas"></canvas>

    <!-- Top-3 brain panels — visible by default -->
    <div id="brainsRow">
      <div class="brainWrap">
        <div class="brainLabel" id="brainLabel0">Top Fit #1</div>
        <canvas class="brainCanvas" id="brain0"></canvas>
      </div>
      <div class="brainWrap">
        <div class="brainLabel" id="brainLabel1">Top Fit #2</div>
        <canvas class="brainCanvas" id="brain1"></canvas>
      </div>
      <div class="brainWrap">
        <div class="brainLabel" id="brainLabel2">Top Fit #3</div>
        <canvas class="brainCanvas" id="brain2"></canvas>
      </div>
    </div>

    <!-- Selected creature info — hidden until a creature is tapped -->
    <div id="creatureInfo">
      <div id="infoHeader">
        <span id="panelTitle">Creature</span>
        <button id="closePanelBtn">✕</button>
      </div>
      <canvas id="brainDetail"></canvas>
      <div id="panelStats"></div>
    </div>
  </div>
</div>

<!-- Settings / initial conditions panel (still a fixed overlay — doesn't cover world game area when opened briefly) -->
<div id="configPanel">
  <div id="configHandle"></div>
  <div class="cfg-section">Initial Conditions</div>

  <div class="cfg-row">
    <span class="cfg-label">Herbivores</span>
    <input type="range" id="cfgN0" min="5" max="80" value="30" step="1">
    <span class="cfg-val" id="cfgN0Val">30</span>
  </div>
  <div class="cfg-row">
    <span class="cfg-label">Carnivores</span>
    <input type="range" id="cfgNpred" min="0" max="20" value="6" step="1">
    <span class="cfg-val" id="cfgNpredVal">6</span>
  </div>
  <div class="cfg-row">
    <span class="cfg-label">Food Pellets</span>
    <input type="range" id="cfgFood" min="10" max="200" value="80" step="5">
    <span class="cfg-val" id="cfgFoodVal">80</span>
  </div>
  <div class="cfg-row">
    <span class="cfg-label">World Size</span>
    <input type="range" id="cfgWorld" min="60" max="240" value="120" step="20">
    <span class="cfg-val" id="cfgWorldVal">120</span>
  </div>
  <div class="cfg-row">
    <span class="cfg-label">Random Seed</span>
    <input type="range" id="cfgSeed" min="1" max="99" value="1" step="1">
    <span class="cfg-val" id="cfgSeedVal">1</span>
  </div>

  <div class="cfg-section" style="margin-top:16px">Actions</div>

  <div class="cfg-actions">
    <button class="hbtn" id="restartBtn">↺ Restart</button>
    <button class="hbtn" id="saveBtn">💾 Save</button>
    <button class="hbtn" id="loadBtn">📂 Load</button>
    <button class="hbtn" id="closeConfigBtn">✕</button>
  </div>
</div>

<input type="file" id="fileInput" accept=".json" style="display:none">

<script src="sim.js"></script>
</body>
</html>
